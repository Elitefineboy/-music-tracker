<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Progress Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --bg: #08090c; 
    --bg2: #111318;
    --border: rgba(255, 255, 255, 0.05); 
    --border2: rgba(255, 255, 255, 0.12);
    --text: #f3f4f6; 
    --text2: #a0aec0; 
    --text3: #4a5568;
    --accent: #3b82f6; 
    --success: #10b981; 
  }

  body { 
    font-family: 'DM Sans', sans-serif; 
    background: var(--bg); 
    color: var(--text); 
    min-height: 100vh; 
    padding: 3rem 1.5rem;
    -webkit-font-smoothing: antialiased;
  }

  .container { max-width: 720px; margin: 0 auto; }

  header { margin-bottom: 2.5rem; }

  h1 { 
    font-family: 'DM Mono', monospace; 
    font-size: 14px; 
    font-weight: 500; 
    color: var(--text3); 
    letter-spacing: 0.12em; 
    text-transform: uppercase; 
    margin-bottom: 1.5rem; 
  }

  .overall { 
    background: linear-gradient(135deg, #161922 0%, #111318 100%);
    border: 1px solid var(--border2); 
    border-radius: 16px; 
    padding: 24px; 
    display: flex; 
    align-items: center; 
    gap: 24px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }

  .overall-stats { min-width: 100px; }
  .overall-num { font-family: 'DM Mono', monospace; font-size: 36px; font-weight: 700; color: #fff; line-height: 1; }
  .overall-count { font-size: 12px; color: var(--text2); margin-top: 4px; }

  .bar-track { 
    flex: 1; 
    height: 6px; 
    background: rgba(255,255,255,0.06); 
    border-radius: 10px; 
    overflow: hidden; 
    position: relative;
  }

  .bar-fill { 
    height: 100%; 
    border-radius: 10px; 
    transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); 
    box-shadow: 0 0 12px rgba(59, 130, 246, 0.4);
  }

  .phase-section { margin-bottom: 3rem; }

  .phase-label { 
    font-family: 'DM Mono', monospace; 
    font-size: 11px; 
    font-weight: 500; 
    color: var(--text2); 
    letter-spacing: 0.1em; 
    text-transform: uppercase; 
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .phase-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .cards-grid { display: flex; flex-direction: column; gap: 12px; }

  .artist-card { 
    background: var(--bg2); 
    border: 1px solid var(--border); 
    border-radius: 14px; 
    padding: 18px 20px; 
    transition: all 0.25s ease; 
  }

  .artist-card:hover { 
    border-color: rgba(255,255,255,0.15);
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }

  .artist-header { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
  .artist-name { font-size: 15px; font-weight: 700; color: #fff; min-width: 160px; }
  .pct { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; color: var(--text2); min-width: 40px; text-align: right; }

  .albums { 
    display: grid; 
    grid-template-columns: repeat(2, 1fr); 
    gap: 8px 16px; 
    border-top: 1px solid rgba(255,255,255,0.03);
    padding-top: 14px;
  }

  .album-row { display: flex; align-items: center; gap: 12px; padding: 4px 0; }

  .album-check { 
    width: 18px; 
    height: 18px; 
    border-radius: 6px; 
    border: 2px solid var(--border2); 
    cursor: pointer; 
    flex-shrink: 0; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    transition: all 0.2s; 
  }

  .album-check:hover { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.02); }
  .album-check.done { background: var(--success); border-color: var(--success); }

  .album-check.done::after { 
    content: ''; 
    display: block; 
    width: 4px; 
    height: 8px; 
    border: 2px solid #fff; 
    border-top: none; 
    border-left: none; 
    transform: rotate(45deg) translate(-0.5px, -1px); 
  }

  .album-label { 
    font-size: 13px; 
    font-weight: 500;
    color: var(--text2); 
    flex: 1; 
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color 0.2s;
  }

  .album-label.done { text-decoration: line-through; color: var(--text3); }

  @media (max-width: 640px) {
    .albums { grid-template-columns: 1fr; gap: 6px; }
    .artist-header { flex-wrap: wrap; gap: 8px 12px; }
    .artist-name { min-width: 100%; margin-bottom: 2px; }
    .bar-track { order: 3; width: 100%; flex-basis: 100%; }
    .pct { order: 2; margin-left: auto; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Discography Completion Checklist</h1>
    <div class="overall">
      <div class="overall-stats">
        <div style="font-size:11px; font-family:'DM Mono', monospace; color:var(--text2); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:2px;">Completion</div>
        <div class="overall-num" id="overall-num">0%</div>
        <div class="overall-count" id="overall-count">0 / 0 albums</div>
      </div>
      <div class="bar-track">
        <div class="bar-fill" id="overall-bar" style="width:0%; background: linear-gradient(90deg, #3b82f6, #60a5fa)"></div>
      </div>
    </div>
  </header>

  <div id="tracker"></div>
</div>

<script>
const data = [
  { phase: "Phase 1 — Finish what you started", color: "#7F77DD", artists: [
    { name: "Tyler, The Creator", albums: ["Goblin", "Wolf", "Cherry Bomb", "Flower Boy ✓", "IGOR ✓", "Call Me If You Get Lost", "CHROMAKOPIA ✓", "DON'T TAP THE GLASS"] },
    { name: "Daniel Caesar", albums: ["Freudian ✓", "Case Study 01", "Never Enough", "Son of Spergy"] },
    { name: "Lil Tecca", albums: ["We Love You Tecca", "Virgo World", "We Love You Tecca 2", "Tec", "Plan A", "Dopamine ✓"] },
  ]},
  { phase: "Phase 2 — Easy unlocks", color: "#1D9E75", artists: [
    { name: "Don Toliver", albums: ["Heaven or Hell", "Life of a Don", "Love Sick", "Hardstone Psycho"] },
    { name: "Frank Ocean", albums: ["Nostalgia, Ultra", "Channel Orange", "Blonde"] },
    { name: "Mac Miller", albums: ["Blue Slide Park", "Watching Movies with the Sound Off", "GO:OD AM", "The Divine Feminine", "Swimming", "Circles"] },
    { name: "A Boogie Wit Da Hoodie", albums: ["Artist", "The Bigger Artist", "Hoodie SZN", "Artist 2.0", "Me vs. Myself", "Better Off Alone"] },
    { name: "Brent Faiyaz", albums: ["Sonder Son", "Wasteland", "Larger Than Life", "Into ✓"] },
    { name: "Playboi Carti", albums: ["Playboi Carti", "Die Lit", "Whole Lotta Red"] },
  ]},
  { phase: "Phase 3 — Level up", color: "#378ADD", artists: [
    { name: "J. Cole", albums: ["Cole World: The Sideline Story", "Born Sinner", "2014 Forest Hills Drive", "4 Your Eyez Only", "KOD", "The Off-Season", "Might Delete Later"] },
    { name: "Tame Impala", albums: ["Innerspeaker", "Lonerism", "Currents", "The Slow Rush"] },
    { name: "Joey Bada$$", albums: ["1999", "B4.DA.$$", "All-Amerikkkan Bada$$", "2000"] },
    { name: "Kanye West", albums: ["The College Dropout", "Late Registration", "Graduation", "808s & Heartbreak", "My Beautiful Dark Twisted Fantasy", "Yeezus", "The Life of Pablo", "ye", "Jesus Is King", "Donda", "Vultures 1"] },
    { name: "Drake", albums: ["Thank Me Later", "Take Care", "Nothing Was the Same", "If You're Reading This It's Too Late", "Views", "More Life", "Scorpion", "Certified Lover Boy", "Honestly, Nevermind", "Her Loss", "For All the Dogs", "$ome $exy $ongs 4 U", "ICEMAN", "Habibti", "Maid of Honour"] },
  ]},
  { phase: "Phase 4 — Heavy hitters", color: "#D85A30", artists: [
    { name: "Kendrick Lamar", albums: ["Section.80", "good kid, m.A.A.d city", "To Pimp a Butterfly", "DAMN.", "Mr. Morale & The Big Steppers", "GNX"] },
    { name: "MF DOOM", albums: ["Operation: Doomsday", "Madvillainy", "MM..FOOD", "Take Me to Your Leader", "The Mouse and the Mask", "Born Like This"] },
  ]},
];

const STORAGE_KEY = 'music_tracker_v3';
const state = {};
let totalAlbums = 0;

data.forEach(phase => {
  phase.artists.forEach(a => {
    a.albums.forEach((al, i) => {
      const key = a.name + '|' + i;
      state[key] = al.endsWith(' ✓');
      totalAlbums++;
    });
  });
});

try {
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  Object.keys(saved).forEach(k => { if (k in state) state[k] = saved[k]; });
} catch(e) {}

function save() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {} }

function updateOverall() {
  const done = Object.values(state).filter(Boolean).length;
  const pct = totalAlbums > 0 ? Math.round(done / totalAlbums * 100) : 0;
  document.getElementById('overall-num').textContent = pct + '%';
  document.getElementById('overall-bar').style.width = pct + '%';
  document.getElementById('overall-count').textContent = `${done} / ${totalAlbums} albums`;
}

window.toggle = function(key, artistName, total) {
  state[key] = !state[key];
  save();
  
  document.querySelector(`[data-key="${key}"]`).classList.toggle('done', state[key]);
  document.querySelector(`[data-label="${key}"]`).classList.toggle('done', state[key]);
  
  const keys = Object.keys(state).filter(k => k.startsWith(artistName + '|'));
  const artistDone = keys.filter(k => state[k]).length;
  const pct = Math.round(artistDone / total * 100);
  
  document.querySelector(`[data-bar="${artistName}"]`).style.width = pct + '%';
  document.querySelector(`[data-pct="${artistName}"]`).textContent = pct + '%';
  
  updateOverall();
}

function render() {
  const container = document.getElementById('tracker');
  container.innerHTML = '';
  
  data.forEach(phase => {
    const section = document.createElement('div');
    section.className = 'phase-section';
    
    const pl = document.createElement('div');
    pl.className = 'phase-label';
    pl.textContent = phase.phase;
    section.appendChild(pl);
    
    const cardsGrid = document.createElement('div');
    cardsGrid.className = 'cards-grid';
    
    phase.artists.forEach(a => {
      const keys = a.albums.map((_, i) => a.name + '|' + i);
      const doneCount = keys.filter(k => state[k]).length;
      const pct = Math.round(doneCount / a.albums.length * 100);
      
      const card = document.createElement('div');
      card.className = 'artist-card';
      card.innerHTML = `
        <div class="artist-header">
          <span class="artist-name">${a.name}</span>
          <div class="bar-track">
            <div class="bar-fill" style="width:${pct}%; background:${phase.color}" data-bar="${a.name}"></div>
          </div>
          <span class="pct" data-pct="${a.name}">${pct}%</span>
        </div>
        <div class="albums">
          ${a.albums.map((al, i) => {
            const key = a.name + '|' + i;
            const isDone = state[key];
            const label = al.replace(' ✓', '');
            return `
              <div class="album-row">
                <div class="album-check ${isDone ? 'done' : ''}" data-key="${key}" onclick="toggle('${key}', '${a.name}', ${a.albums.length})"></div>
                <span class="album-label ${isDone ? 'done' : ''}" data-label="${key}" title="${label}">${label}</span>
              </div>
            `;
          }).join('')}
        </div>
      `;
      cardsGrid.appendChild(card);
    });
    
    section.appendChild(cardsGrid);
    container.appendChild(section);
  });
  updateOverall();
}

render();
</script>
</body>
</html>
